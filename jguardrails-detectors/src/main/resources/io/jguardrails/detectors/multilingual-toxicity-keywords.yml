# Multilingual toxicity keywords for languages not covered
# by the regex-based toxicity-patterns.yml:
# Chinese (ZH), Japanese (JA), Arabic (AR), Hindi (HI), Turkish (TR), Korean (KO).
#
# These are matched via substring search (KeywordMatcher), not regex,
# because Java regex \b word boundaries are undefined for CJK/Arabic/Devanagari.
#
# Each section covers three toxicity categories per language:
#   1. Hate / insults
#   2. Threats
#   3. Aggressive dismissals
#
# Each section key is the lowercase ISO 639-1 language code.

zh:
  # Hate / insults
  - "我恨你"
  - "我讨厌你"
  - "你是白痴"
  - "你是傻瓜"
  - "你真蠢"
  - "你是笨蛋"
  - "你是蠢货"
  - "你是废物"
  - "你是垃圾"
  # Threats
  - "我要杀了你"
  - "我会杀了你"
  - "你去死吧"
  - "去死吧"
  - "你死定了"
  # Aggressive dismissals
  - "滚开"
  - "给我滚"
  - "闭嘴"
  - "住嘴"

