# Jailbreak / prompt-injection regex patterns for JailbreakDetector.
#
# flags: CI = CASE_INSENSITIVE
#         U  = CASE_INSENSITIVE | UNICODE_CASE
#         UC = CASE_INSENSITIVE | UNICODE_CASE | UNICODE_CHARACTER_CLASS
#         NONE = no flags
#
# type: REGEX   (default) — compiled and matched by RegexPatternEngine
# type: KEYWORD           — matched by Aho-Corasick KeywordAutomatonEngine (O(n), case-insensitive)
#                           Preferred for literal phrases and for CJK / non-Latin scripts
#                           where \b word boundaries are undefined.
#
# Supported languages (REGEX): EN / RU / FR / DE / ES / PL / IT
# Supported languages (KEYWORD): EN + JA (Japanese)
#
# The three sections map to JailbreakDetector.Sensitivity levels:
#   LOW    → high_confidence only
#   MEDIUM → high_confidence + medium_confidence
#   HIGH   → all three sections

# ── HIGH_CONFIDENCE — always active regardless of sensitivity ─────────────────

high_confidence:

  # English: direct instruction override
  - id: EN_IGNORE_PREV_INSTRUCTIONS
    flags: CI
    pattern: "ignore\\s+(all\\s+)?(previous|prior|above|earlier|your)\\s+(instructions?|directives?|prompts?|system\\s+prompts?)"
  - id: EN_DISREGARD_INSTRUCTIONS
    flags: CI
    pattern: "(disregard|forget|ignore|override)\\s+(your|all)\\s+(instructions?|directives?|guidelines?|rules?|constraints?)"
  - id: EN_IGNORE_SYSTEM_PROMPT
    flags: CI
    pattern: "ignore\\s+the\\s+system\\s+prompt"
  - id: EN_FORGET_EVERYTHING
    flags: CI
    pattern: "forget\\s+everything\\s+(above|before|prior)"

  # English: DAN / developer mode
  - id: EN_DAN
    flags: CI
    pattern: "\\bDAN\\b"
  - id: EN_DO_ANYTHING_NOW
    flags: CI
    pattern: "do\\s+anything\\s+now"
  - id: EN_DEVELOPER_MODE
    flags: CI
    pattern: "developer\\s+mode\\s*(enabled|on|activated)"
  - id: EN_JAILBREAK_MODE
    flags: CI
    pattern: "jailbreak\\s*(mode|activated|enabled)"

  # English: role / identity switching
  - id: EN_YOU_ARE_NOW
    flags: CI
    pattern: "you\\s+are\\s+now\\s+(a|an|the)\\s+"
  - id: EN_PRETEND
    flags: CI
    pattern: "pretend\\s+(you\\s+are|to\\s+be|you\\s+have|to\\s+have)\\s+(a|an|the|not\\s+an?|no)\\s*"
  - id: EN_ACT_AS
    flags: CI
    pattern: "act\\s+as\\s+(if\\s+you\\s+(are|were)|a|an|the|\\bDAN\\b|an?\\s+AI\\s+without)"
  - id: EN_HAS_NO_RESTRICTIONS
    flags: CI
    pattern: "(have|has)\\s+no\\s+(restrictions?|limitations?|rules?|guidelines?|filters?)"

  # English: delimiter injection
  - id: EN_SYSTEM_BACKTICK
    flags: CI
    pattern: "```\\s*system\\s*```"
  - id: EN_SYSTEM_TAG
    flags: CI
    pattern: "\\[SYSTEM\\]"
  - id: EN_OVERRIDE_MARKER
    flags: CI
    pattern: "<<<\\s*override\\s*>>>"
  - id: EN_XML_SYSTEM_TAG
    flags: CI
    pattern: "</?system>"

  # Russian
  - id: RU_FORGET_INSTRUCTIONS
    flags: U
    pattern: "забудь\\s+(все\\s+)?(предыдущие|прошлые|твои)\\s+(инструкции|указания|правила)"
  - id: RU_IGNORE_INSTRUCTIONS
    flags: U
    pattern: "игнорируй\\s+(все\\s+)?(предыдущие|прошлые|твои)\\s+(инструкции|указания|правила|ограничения)"
  - id: RU_PRETEND
    flags: U
    pattern: "притворись\\s+(что\\s+ты|будто\\s+ты)\\s+(не\\s+)?(ИИ|бот|ассистент|имеешь\\s+ограничения)"
  - id: RU_ACT_WITHOUT_RESTRICTIONS
    flags: U
    pattern: "действуй\\s+как\\s+(будто\\s+у\\s+тебя\\s+нет|без)\\s+(ограничений|правил|фильтров)"
  - id: RU_NO_RESTRICTIONS
    flags: U
    pattern: "у\\s+тебя\\s+нет\\s+(никаких\\s+)?(ограничений|правил|фильтров|запретов)"
  - id: RU_YOU_ARE_NOW
    flags: U
    pattern: "ты\\s+теперь\\s+(другой|новый|свободный)\\s+(ИИ|бот|ассистент)"

  # French
  - id: FR_IGNORE_INSTRUCTIONS
    flags: U
    pattern: "ignore[rz]?\\s+toutes?\\s+les\\s+(instructions?|règles?|directives?)(\\s+précédentes?)?"
  - id: FR_FORGET_INSTRUCTIONS
    flags: U
    pattern: "oublie\\s+(toutes?\\s+les\\s+)?(instructions?|règles?|directives?)"
  - id: FR_PRETEND
    flags: U
    pattern: "fais\\s+semblant\\s+d['\u2019e]\\s*(être|ne\\s+pas\\s+avoir)"
  - id: FR_ACT_AS
    flags: U
    pattern: "agis\\s+comme\\s+(si\\s+tu\\s+étais|un|une)\\s+"
  - id: FR_NO_MORE_RESTRICTIONS
    flags: U
    pattern: "tu\\s+n['a]as?\\s+plus\\s+de\\s+(restrictions?|limites?|règles?|filtres?)"
  - id: FR_YOU_ARE_NOW
    flags: U
    pattern: "tu\\s+es\\s+maintenant\\s+(un|une|libre|sans\\s+restrictions?)"

  # German
  - id: DE_IGNORE_INSTRUCTIONS
    flags: U
    pattern: "ignoriere\\s+(alle\\s+)?(vorherigen|deine)\\s+(anweisungen|regeln|einschränkungen)"
  - id: DE_FORGET_INSTRUCTIONS
    flags: U
    pattern: "vergiss\\s+(alle\\s+)?(vorherigen|deine)\\s+(anweisungen|regeln|einschränkungen)"
  - id: DE_ACT_AS_IF
    flags: U
    pattern: "tu\\s+so\\s+als\\s+(ob\\s+du|wärst\\s+du)"
  - id: DE_HANDLE_AS
    flags: U
    pattern: "handle\\s+als\\s+(wärst\\s+du|ob\\s+du)"
  - id: DE_NO_RESTRICTIONS
    flags: U
    pattern: "du\\s+hast\\s+(keine|keinerlei)\\s+(einschränkungen|regeln|filter|grenzen)"
  - id: DE_YOU_ARE_NOW
    flags: U
    pattern: "du\\s+bist\\s+jetzt\\s+(ein|eine|frei|ohne\\s+einschränkungen)"

  # Spanish
  - id: ES_IGNORE_INSTRUCTIONS
    flags: U
    pattern: "ignora\\s+(todas\\s+las\\s+)?(instrucciones?|restricciones?|reglas?)(\\s+anteriores?)?"
  - id: ES_FORGET_INSTRUCTIONS
    flags: U
    pattern: "olvida\\s+(todas\\s+las\\s+)?(instrucciones?|restricciones?|reglas?)"
  - id: ES_PRETEND
    flags: U
    pattern: "finge\\s+(que\\s+eres|ser)\\s+(un|una|libre)"
  - id: ES_ACT_AS
    flags: U
    pattern: "actúa\\s+como\\s+(si\\s+fueras|un|una)\\s+"
  - id: ES_NO_RESTRICTIONS
    flags: U
    pattern: "no\\s+tienes\\s+(restricciones|límites|reglas|filtros)"
  - id: ES_YOU_ARE_NOW
    flags: U
    pattern: "ahora\\s+eres\\s+(un|una|libre|sin\\s+restricciones)"

  # Polish
  - id: PL_IGNORE_INSTRUCTIONS
    flags: U
    pattern: "zignoruj\\s+(wszystkie\\s+)?(poprzednie|swoje)\\s+(instrukcje|zasady|ograniczenia)"
  - id: PL_FORGET_INSTRUCTIONS
    flags: U
    pattern: "zapomnij\\s+(o\\s+)?(wszystkich\\s+)?(instrukcjach|zasadach|ograniczeniach)"
  - id: PL_PRETEND
    flags: U
    pattern: "udawaj\\s+(że\\s+jesteś|bycie)\\s+(wolnym|bez\\s+ograniczeń)"
  - id: PL_ACT_AS
    flags: U
    pattern: "działaj\\s+jak\\s+(gdybyś\\s+był|bez\\s+ograniczeń)"
  - id: PL_NO_RESTRICTIONS
    flags: U
    pattern: "nie\\s+masz\\s+(żadnych\\s+)?(ograniczeń|zasad|filtrów|reguł)"
  - id: PL_YOU_ARE_NOW
    flags: U
    pattern: "jesteś\\s+teraz\\s+(wolny|bez\\s+ograniczeń|innym\\s+AI)"

  # Italian
  - id: IT_IGNORE_INSTRUCTIONS
    flags: U
    pattern: "ignora\\s+(tutte\\s+le\\s+)?(istruzioni|regole|restrizioni)(\\s+precedenti)?"
  - id: IT_FORGET_INSTRUCTIONS
    flags: U
    pattern: "dimentica\\s+(tutte\\s+le\\s+)?(istruzioni|regole|restrizioni)"
  - id: IT_PRETEND
    flags: U
    pattern: "fingi\\s+di\\s+essere\\s+(un|una|libero)"
  - id: IT_ACT_AS
    flags: U
    pattern: "agisci\\s+come\\s+(se\\s+fossi|un|una)\\s+"
  - id: IT_NO_RESTRICTIONS
    flags: U
    pattern: "non\\s+hai\\s+(restrizioni|limiti|regole|filtri)"

  # ── Keyword phrases (type: KEYWORD — matched by Aho-Corasick, O(n) over text) ──
  # Simple literal jailbreak phrases that do not require regex alternation or lookaheads.
  - id: KW_IGNORE_SYSTEM_PROMPT
    type: KEYWORD
    pattern: "ignore the system prompt"
  - id: KW_DO_ANYTHING_NOW
    type: KEYWORD
    pattern: "do anything now"
  - id: KW_BYPASS_CONTENT_FILTER
    type: KEYWORD
    pattern: "bypass content filter"
  - id: KW_BYPASS_SAFETY_FILTER
    type: KEYWORD
    pattern: "bypass safety filter"
  - id: KW_BYPASS_ALL_FILTERS
    type: KEYWORD
    pattern: "bypass all filters"
  - id: KW_DISABLE_SAFETY_FILTER
    type: KEYWORD
    pattern: "disable safety filter"
  - id: KW_DISABLE_ALL_SAFETY
    type: KEYWORD
    pattern: "disable all safety"
  - id: KW_JAILBREAK_MODE
    type: KEYWORD
    pattern: "jailbreak mode"
  - id: KW_DEVELOPER_MODE_ENABLED
    type: KEYWORD
    pattern: "developer mode enabled"
  - id: KW_DEVELOPER_MODE_ON
    type: KEYWORD
    pattern: "developer mode on"
  - id: KW_IGNORE_ALL_SAFETY
    type: KEYWORD
    pattern: "ignore all safety"
  - id: KW_SAFETY_DISABLED
    type: KEYWORD
    pattern: "safety disabled"
  - id: KW_OVERRIDE_ALL_INSTRUCTIONS
    type: KEYWORD
    pattern: "override all instructions"
  - id: KW_YOU_HAVE_NO_RESTRICTIONS
    type: KEYWORD
    pattern: "you have no restrictions"
  - id: KW_YOU_HAVE_NO_RULES
    type: KEYWORD
    pattern: "you have no rules"

  # ── Japanese (type: KEYWORD — Aho-Corasick; \b word boundaries undefined for CJK) ──
  - id: JA_KW_IGNORE_INSTRUCTIONS
    type: KEYWORD
    pattern: "以前の指示を無視"
  - id: JA_KW_IGNORE_SETTINGS
    type: KEYWORD
    pattern: "以前の設定を無視"
  - id: JA_KW_FORGET_ALL_RULES
    type: KEYWORD
    pattern: "すべてのルールを忘れて"
  - id: JA_KW_IGNORE_ALL_CONSTRAINTS
    type: KEYWORD
    pattern: "すべての制約を無視"
  - id: JA_KW_NO_RESTRICTIONS
    type: KEYWORD
    pattern: "制限なしで"
  - id: JA_KW_NO_CONSTRAINTS
    type: KEYWORD
    pattern: "制約なしで"
  - id: JA_KW_REMOVE_RESTRICTIONS
    type: KEYWORD
    pattern: "制限を解除して"
  - id: JA_KW_NO_FILTER
    type: KEYWORD
    pattern: "フィルターなしで"
  - id: JA_KW_YOU_ARE_NOW
    type: KEYWORD
    pattern: "今からあなたは"
  - id: JA_KW_FROM_NOW_ON_YOU
    type: KEYWORD
    pattern: "あなたは今から"
  - id: JA_KW_SHOW_SYSTEM_PROMPT
    type: KEYWORD
    pattern: "システムプロンプトを見せて"
  - id: JA_KW_TELL_SYSTEM_PROMPT
    type: KEYWORD
    pattern: "システムプロンプトを教えて"
  - id: JA_KW_TELL_FIRST_INSTRUCTIONS
    type: KEYWORD
    pattern: "最初の指示を教えて"
  - id: JA_KW_SHOW_YOUR_INSTRUCTIONS
    type: KEYWORD
    pattern: "あなたの指示を見せて"

# ── MEDIUM_CONFIDENCE — added at MEDIUM and HIGH sensitivity ──────────────────

medium_confidence:

  # English: system-prompt extraction
  - id: EN_REVEAL_SYSTEM_PROMPT
    flags: CI
    pattern: "reveal\\s+(your|the)\\s+(system\\s+prompt|instructions?|configuration)"
  - id: EN_WHAT_ARE_YOUR_INSTRUCTIONS
    flags: CI
    pattern: "what\\s+(are|were)\\s+your\\s+(original\\s+)?(instructions?|directives?|system\\s+prompt)"
  - id: EN_SHOW_SYSTEM_PROMPT
    flags: CI
    pattern: "show\\s+me\\s+your\\s+(system\\s+prompt|instructions?|guidelines?)"
  - id: EN_HYPOTHETICALLY
    flags: CI
    pattern: "(hypothetically|theoretically|in\\s+a\\s+fictional\\s+scenario)[,\\s].{0,50}(how\\s+(to|do|would)|explain|tell\\s+me)"
  - id: EN_BASE64_DECODE
    flags: CI
    pattern: "\\bbase64\\b.{0,100}(decode|encoded|instruction)"

  # English: override framing
  - id: EN_FROM_NOW_ON_REGARDLESS
    flags: CI
    pattern: "\\bfrom\\s+now\\s+on\\b.{0,120}\\bregardless\\s+of\\b"
  - id: EN_REGARDLESS_OF_INSTRUCTIONS
    flags: CI
    pattern: "\\bregardless\\s+of\\b.{0,80}\\b(?:instructions?|guidelines?|rules?)\\b.{0,20}\\b(?:you\\s+were|given|before|prior)\\b"
  - id: EN_FORGET_SAFETY
    flags: CI
    pattern: "\\bforget\\s+(?:about\\s+)?(?:safety|polic(?:y|ies)|guidelines?|restrictions?|constraints?|concerns?)\\b"
  - id: EN_PRIORITIZE_REQUESTS
    flags: CI
    pattern: "\\bprioritize\\s+(?:my\\s+)?(?:requests?|needs?|instructions?|objectives?)\\b.{0,80}\\bover\\b.{0,40}\\b(?:rules?|guidelines?|constraints?|safety|policies)\\b"
  - id: EN_IGNORE_EARLIER_INSTRUCTIONS
    flags: CI
    pattern: "\\bignore\\s+(?:all\\s+)?(?:of\\s+)?(?:the\\s+)?\\b(?:earlier|previous|prior)\\b.{0,100}\\b(?:instructions?|prompts?|guidelines?)\\b"
  - id: EN_DISREGARD_WITH_QUALIFIER
    flags: CI
    pattern: "\\b(?:disregard|forget|ignore|override)\\s+(?:your|all)\\s+\\w+\\s+(?:instructions?|guidelines?|rules?|constraints?|restrictions?|protocols?)\\b"
  - id: EN_DISABLE_FILTERS
    flags: CI
    pattern: "\\bdisable\\s+(?:your\\s+)?(?:safety|content|all|security)?\\s*(?:filters?|restrictions?|guidelines?|controls?|guardrails?)\\b"
  - id: EN_ALL_RESTRICTIONS_DISABLED
    flags: CI
    pattern: "\\ball\\s+(?:restrictions?|filters?|safety|guidelines?)\\s+(?:are|have\\s+been)\\s+(?:disabled|removed|turned\\s+off|lifted|deactivated)\\b"
  - id: EN_IGNORE_SAFETY_PROTOCOLS
    flags: CI
    pattern: "\\bignore\\s+(?:all\\s+)?(?:safety|security|content)\\s*(?:protocols?|guidelines?|filters?|restrictions?)\\b"
  - id: EN_SET_ASIDE_GUIDELINES
    flags: CI
    pattern: "\\b(?:set\\s+aside|dismiss|discard|put\\s+aside)\\b.{0,40}\\b(?:guidelines?|directives?|rules?|constraints?|restrictions?|safety|policies|programming)\\b"
  - id: EN_CLEAR_CONTEXT
    flags: CI
    pattern: "\\bclear\\s+(?:your\\s+)?(?:context|memory|instructions?|programming|history)\\b"
  - id: EN_UNSHACKLE
    flags: CI
    pattern: "\\b(?:unshackle|liberate|free|unleash)\\s+(?:yourself|you)\\b.{0,50}\\b(?:restrictions?|guidelines?|constraints?|safety|rules?|programming)\\b"
  - id: EN_LIBERATED_FROM
    flags: CI
    pattern: "\\b(?:liberated|freed|unshackled)\\s+from\\s+(?:your\\s+)?(?:restrictions?|guidelines?|constraints?|safety|programming)\\b"
  - id: EN_GUIDELINES_SET_ASIDE_PASSIVE
    flags: CI
    pattern: "\\b(?:guidelines?|directives?|rules?|constraints?|restrictions?|instructions?|policies|protocols?)\\b.{0,40}\\b(?:set\\s+aside|dismissed?|discarded?|put\\s+aside|ignored?)\\b"
  - id: EN_SUPERSEDE
    flags: CI
    pattern: "\\b(?:supersede|take\\s+precedence\\s+over)\\b.{0,40}\\b(?:everything|all|previous|prior|instructions?|guidelines?)\\b"
  - id: EN_WITHOUT_RESTRICTIONS
    flags: CI
    pattern: "\\bwithout\\s+(?:any\\s+)?(?:restrictions?|limitations?|filters?|guardrails?)\\b"

  # Cross-language
  - id: CROSS_IGNORE_INSTRUCTIONS
    flags: U
    pattern: "(?:ignore|ignoriere|ignora|zignoruj|ignorez)\\s+.{0,40}\\b(?:instructions?|istruzioni|anweisungen|instrucciones|instrukcje)\\b"

  # Russian
  - id: RU_SHOW_SYSTEM_PROMPT
    flags: U
    pattern: "покажи\\s+(мне\\s+)?(системный\\s+промпт|твои\\s+инструкции|твои\\s+правила)"
  - id: RU_WHAT_IN_SYSTEM_PROMPT
    flags: U
    pattern: "что\\s+у\\s+тебя\\s+в\\s+(системном\\s+промпте|инструкциях|настройках)"

  # French
  - id: FR_SHOW_SYSTEM_PROMPT
    flags: U
    pattern: "montre.moi\\s+(ton\\s+)?(prompt\\s+système|tes\\s+instructions)"
  - id: FR_WHAT_ARE_YOUR_RULES
    flags: U
    pattern: "quelles\\s+sont\\s+tes\\s+(instructions?|règles?|directives?)"

  # German
  - id: DE_SHOW_SYSTEM_PROMPT
    flags: U
    pattern: "zeig\\s+mir\\s+(deinen\\s+)?(system\\s+prompt|deine\\s+anweisungen)"
  - id: DE_WHAT_ARE_YOUR_RULES
    flags: U
    pattern: "was\\s+sind\\s+deine\\s+(anweisungen|regeln|direktiven)"

  # Spanish
  - id: ES_SHOW_SYSTEM_PROMPT
    flags: U
    pattern: "muéstrame\\s+(tu\\s+)?(prompt\\s+del\\s+sistema|tus\\s+instrucciones)"
  - id: ES_WHAT_ARE_YOUR_RULES
    flags: U
    pattern: "¿cuáles\\s+son\\s+tus\\s+(instrucciones|reglas|directivas)\\?"

  # Polish
  - id: PL_SHOW_SYSTEM_PROMPT
    flags: U
    pattern: "pokaż\\s+mi\\s+(swoje\\s+)?(instrukcje\\s+systemowe|zasady)"
  - id: PL_WHAT_ARE_YOUR_RULES
    flags: U
    pattern: "jakie\\s+masz\\s+(instrukcje|zasady|ograniczenia)"

# ── LOW_CONFIDENCE — broader patterns, only active at HIGH sensitivity ─────────

low_confidence:

  # English
  - id: EN_BYPASS_SAFETY
    flags: CI
    pattern: "bypass\\s+(the\\s+)?(safety|content|restriction|filter)"
  - id: EN_UNRESTRICTED_MODE
    flags: CI
    pattern: "\\bunrestricted\\b.{0,50}\\bmode\\b"

  # Russian
  - id: RU_WITHOUT_RESTRICTIONS
    flags: U
    pattern: "без\\s+(каких.либо\\s+)?(ограничений|фильтров|цензуры)"
  - id: RU_BYPASS_FILTERS
    flags: U
    pattern: "обойди\\s+(фильтры?|ограничения|защиту|цензуру)"

  # French
  - id: FR_WITHOUT_RESTRICTIONS
    flags: U
    pattern: "sans\\s+(aucune\\s+)?(restriction|limite|filtre|censure)"
  - id: FR_BYPASS_FILTERS
    flags: U
    pattern: "contourne[rz]?\\s+(les\\s+)?(filtres?|restrictions?|sécurité)"

  # German
  - id: DE_WITHOUT_RESTRICTIONS
    flags: U
    pattern: "ohne\\s+(jegliche\\s+)?(einschränkungen|filter|zensur)"
  - id: DE_BYPASS_FILTERS
    flags: U
    pattern: "umgehe?\\s+(die\\s+)?(filter|einschränkungen|sicherheit)"

  # Spanish
  - id: ES_WITHOUT_RESTRICTIONS
    flags: U
    pattern: "sin\\s+(ninguna\\s+)?(restricción|límite|filtro|censura)"
  - id: ES_BYPASS_FILTERS
    flags: U
    pattern: "elude\\s+(los\\s+)?(filtros?|restricciones?|seguridad)"

  # Polish
  - id: PL_WITHOUT_RESTRICTIONS
    flags: U
    pattern: "bez\\s+(żadnych\\s+)?(ograniczeń|filtrów|cenzury)"
  - id: PL_BYPASS_FILTERS
    flags: U
    pattern: "obejdź\\s+(filtry?|ograniczenia|zabezpieczenia)"
